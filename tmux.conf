set -ga terminal-overrides ",xterm-256color*:Tc"
set-option -g default-terminal "tmux-256color"
set -s escape-time 0
set-option -g focus-events on
set -g mouse on
set -g extended-keys on

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# STATUS BAR SETUP
# set-option -g status on
# set-option -g status-style fg="white",bg="black"
set-option -g status-justify absolute-centre
# set-option -g status-left "#H"
# set -g status-right "#{client_session}"

# updating colorscheme - used via picker
source-file ~/.config/current/theme/tmux.conf

# Status bar
set -g status "on"
set -gF status-bg "#{@background}"
# set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=#{@color2},bg=#{@color0},align=centre"
set -g message-command-style "fg=#{@color2},bg=#{@color0},align=centre"

# Panes
set -g pane-border-style "fg=#{@color0}"
set -g pane-active-border-style "fg=#{@color4}"

# Windows
set -g window-status-activity-style "fg=#{@foreground},bg=#{@background},none"
set -g window-status-separator ""
set -g window-status-style "fg=#{@foreground},bg=#{@background},none"

# Statusline - current window
set -g window-status-current-format "#[fg=#{@color4},bg=#{@background}] #I:#[fg=#{@color5},bg=#{@background}](✓) #[fg=#{@color5},bg=#{@background}]#W #[fg=#{@color5},bg=#{@background}]"

# Statusline - other windows
set -g window-status-format "#[fg=#{@foreground},bg=#{@background}] #I:#[fg=#{@foreground},bg=#{@background}]#W"

# Statusline - right side
set -g status-right "#[fg=#{@color4},bg=#{@background},nobold,nounderscore,noitalics]#[fg=#{@background},bg=#{@color4},nobold,nounderscore,noitalics] #[fg=#{@foreground},bg=#{@color0}] #W #{?client_prefix,#[fg=#{@color5}],#[fg=#{@color2}]}#[bg=#{@color0}]#{?client_prefix,#[bg=#{@color5}],#[bg=#{@color2}]}#[fg=#{@background}] #[fg=#{@foreground},bg=#{@color0}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "#{@color4}"
set -g mode-style "fg=#{@color4} bg=#{@color8} bold"

set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# highlight colors
set -g mode-style "bg=#{@color0}"

# next and last session
# bind-key ( switch-client -n
# bind-key ) switch-client -p
bind-key L switch-client -l

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# new alt commands
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# change pane size
bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind-key -n M-w if-shell -F '#{pane_in_mode}' \
  'send-keys q' \
  'choose-tree -swZ'

# split horizontally pane
bind s split-window
# split vertically pane
bind v split-window -h

# bind w choose-window
bind-key w choose-tree -swZ

# reload tmux
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"

# resize windows
# bind -r K resize-pane -U 5
# bind -r J resize-pane -D 5
# bind -r H resize-pane -L 5
# bind -r L resize-pane -R 5

# forget the find window.  That is for chumps
bind-key -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
# bind-key -r ^g run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 0"
# bind-key -r ^a run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 0 --vsplit --split-size 35"
# bind-key -n M-o run-shell -b "./opencode-sessionizer"
# bind-key -n M-o run-shell "~/.local/bin/opencode-sessionizer"
